# This workflow checks all repository links once a week and creates an issue in case of errors. 
name: Links CI

on:
  schedule:
    - cron: "00 22 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  
jobs:
  linkChecker:
    uses: groda/gha-workflows/.github/workflows/link-check.yml@main
    with:
      issue-labels: "report, automated issue"
      # Tell the tool to treat 403 as a successful response
      # (often automated requests from GitHub Actions servers are blocked)
      args: "--accept 403"
